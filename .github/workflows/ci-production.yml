name: CI Production (main)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint_production:
    name: lint_production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install ruff; fi

      - name: Lint with ruff
        run: ruff check .

  tests_production:
    name: tests_production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest; fi

      - name: Run tests
        run: python -m pytest -q

  coverage_production:
    name: coverage_production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest pytest-cov; fi

      - name: Run coverage (quality gate >= 85%)
        run: python -m pytest -q --cov=app --cov-report=term-missing --cov-fail-under=85

  deploy_production:
    name: deploy_production
    runs-on: ubuntu-latest
    needs: [lint_production, tests_production, coverage_production]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (production)
        run: |
          docker build -t myapp:production -t myapp:${{ github.sha }} .
