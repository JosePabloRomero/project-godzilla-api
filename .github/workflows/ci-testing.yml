name: CI Testing (develop)

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  lint_testing:
    name: lint_testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install ruff; fi

      - name: Lint with ruff
        run: ruff check .

  tests_testing:
    name: tests_testing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: godzilla
          POSTGRES_PASSWORD: godzilla
          POSTGRES_DB: godzilla
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U godzilla -d godzilla"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://godzilla:godzilla@localhost:5432/godzilla

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest; fi

      - name: Wait for DB
        run: python scripts/wait_for_db.py

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: python -m pytest -q

  coverage_testing:
    name: coverage_testing
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: godzilla
          POSTGRES_PASSWORD: godzilla
          POSTGRES_DB: godzilla
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U godzilla -d godzilla"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://godzilla:godzilla@localhost:5432/godzilla

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest pytest-cov; fi

      - name: Wait for DB
        run: python scripts/wait_for_db.py

      - name: Run migrations
        run: alembic upgrade head

      - name: Run coverage (quality gate >= 60%)
        run: python -m pytest -q --cov=app --cov-report=term-missing --cov-fail-under=60

  deploy_testing:
    name: deploy_testing
    runs-on: ubuntu-latest
    needs: [lint_testing, tests_testing, coverage_testing]
    environment: testing
    if: github.event_name == 'push'
    steps:
      - name: Trigger Render deploy (testing)
        run: curl -fsSL --retry 3 --retry-delay 2 -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
