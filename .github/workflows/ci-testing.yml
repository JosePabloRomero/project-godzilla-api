name: CI Testing (develop)

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  lint_testing:
    name: lint_testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install ruff; fi

      - name: Lint with ruff
        run: ruff check .

  tests_testing:
    name: tests_testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest; fi

      - name: Run tests
        run: python -m pytest -q

  coverage_testing:
    name: coverage_testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install pytest pytest-cov; fi

      - name: Run coverage (quality gate >= 60%)
        run: python -m pytest -q --cov=app --cov-report=term-missing --cov-fail-under=60

  deploy_testing:
    name: deploy_testing
    runs-on: ubuntu-latest
    needs: [lint_testing, tests_testing, coverage_testing]
    environment: testing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (testing)
        run: |
          docker build -t myapp:testing -t myapp:${{ github.sha }} .
